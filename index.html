const CREATURE_TYPES = {
  fire:     { name: 'Fuego',     color: '#D94A1F', soft: '#FDE6DC', glyph: 'flame'  },
  water:    { name: 'Agua',      color: '#1F6FD9', soft: '#DCE9FD', glyph: 'drop'   },

  electric: { name: 'Eléctrico', color: '#D9A51F', soft: '#FDF3DC', glyph: 'bolt'   },
};
const CREATURE_ANIMALS = {
  cat:       { name: 'Gato',     ears: 'pointed', tail: 'long',   body: 'oval'   },
  dragon:    { name: 'Dragón',   ears: 'horns',   tail: 'spiked', body: 'oval'   },
  bird:      { name: 'Ave',      ears: 'crest',   tail: 'fan',    body: 'egg'    },

  bear:      { name: 'Oso',      ears: 'round',   tail: 'nub',    body: 'chunky' },
};
const ALL_VARIANTS = ['a', 'b', 'c'];
const STAGE_NAMES = ['Huevo', 'Fase Inicial', 'Fase Aprendiz', 'Fase Final'];
const STAGE_NEXT  = [10, 20, 30, null];

function pickVariant(typeKey, animalKey, pokedexHistory) {
  const used = pokedexHistory
    .filter(e => e.typeKey === typeKey && e.animalKey === animalKey && e.variantKey)
    .map(e => e.variantKey);
  const available = ALL_VARIANTS.filter(v => !used.includes(v));
  const pool = available.length > 0 ? available : ALL_VARIANTS;
  return pool[Math.floor(Math.random() * pool.length)];
}

function creatureStageFor(d) { if (d < 10) return 0; if (d < 20) return 1; if (d < 30) return 2; return 3; }

function typeGlyph(type, cx, cy, r, fill) {
  switch (type.glyph) {
    case 'flame':   return <path d={`M ${cx} ${cy-r} q ${r*.6} ${r*.5},0 ${r*1.8} q -${r*.6} -${r*.5},0 -${r*1.8}`} fill={fill}/>;
    case 'drop':    return <path d={`M ${cx} ${cy-r} q ${r*.8} ${r},0 ${r*1.8} q -${r*.8} -${r*.8},0 -${r*1.8}`} fill={fill}/>;
    case 'swirl':   return <path d={`M ${cx-r*.6} ${cy} q ${r*.6} -${r*.6},${r*1.2} 0 q -${r*.6} ${r*.6},-${r*1.2} 0`} fill="none" stroke={fill} strokeWidth={r*.3} strokeLinecap="round"/>;
    case 'leaf':    return <path d={`M ${cx-r*.6} ${cy+r*.4} q ${r*.6} -${r*1.6},${r*1.2} 0 q -${r*.6} ${r*.6},-${r*1.2} 0 Z`} fill={fill}/>;
    case 'bolt':    return <path d={`M ${cx-r*.15} ${cy-r} l -${r*.3} ${r*.8} l ${r*.25} 0 l -${r*.15} ${r*.9} l ${r*.55} -${r} l -${r*.25} 0 l ${r*.1} -${r*.7} Z`} fill={fill}/>;
    case 'moon':    return <path d={`M ${cx+r*.3} ${cy-r*.7} a ${r*.8} ${r*.8} 0 1 0 0 ${r*1.4} a ${r*.6} ${r*.6} 0 1 1 0 -${r*1.4} Z`} fill={fill}/>;
    default: return null;
  }
}
function typeGlyphIcon(t, fill) {
  switch (t.glyph) {
    case 'flame': return <image href="https://storage.googleapis.com/pokegoal-app.firebasestorage.app/ui/fuego_white.png" x="1" y="1" width="22" height="22"/>;
    case 'drop':  return <path d="M12 3c0 0 6 6 6 11a6 6 0 01-12 0c0-5 6-11 6-11z" fill={fill}/>;
    case 'swirl': return <path d="M5 12c2-4 6-4 8 0s6 4 8 0" fill="none" stroke={fill} strokeWidth="2.5" strokeLinecap="round"/>;
    case 'leaf':  return <path d="M5 19c0-8 6-14 14-14-1 9-6 14-14 14z" fill={fill}/>;
    case 'bolt':  return <path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z" fill={fill}/>;
    case 'moon':  return <path d="M18 14a8 8 0 11-8-10 6 6 0 008 10z" fill={fill}/>;
    default: return null;
  }
}
function drawEars(ears, s, color) {
  switch (ears) {
    case 'pointed': return <g><path d={`M ${s*.32} ${s*.32} l ${s*.04} -${s*.14} l ${s*.08} ${s*.08} Z`} fill={color}/><path d={`M ${s*.68} ${s*.32} l -${s*.04} -${s*.14} l -${s*.08} ${s*.08} Z`} fill={color}/></g>;
    case 'horns':   return <g><path d={`M ${s*.34} ${s*.3} q -${s*.03} -${s*.12},${s*.06} -${s*.14} q ${s*.02} ${s*.06},-${s*.01} ${s*.14} Z`} fill={color}/><path d={`M ${s*.66} ${s*.3} q ${s*.03} -${s*.12},-${s*.06} -${s*.14} q -${s*.02} ${s*.06},${s*.01} ${s*.14} Z`} fill={color}/></g>;
    case 'crest':   return <g><path d={`M ${s*.46} ${s*.26} l ${s*.04} -${s*.12} l ${s*.04} ${s*.08} l ${s*.04} -${s*.1} l ${s*.02} ${s*.14} Z`} fill={color}/></g>;
    case 'round':   return <g><circle cx={s*.33} cy={s*.3} r={s*.07} fill={color}/><circle cx={s*.67} cy={s*.3} r={s*.07} fill={color}/></g>;
    case 'bulge':   return <g><circle cx={s*.38} cy={s*.3} r={s*.08} fill={color}/><circle cx={s*.62} cy={s*.3} r={s*.08} fill={color}/></g>;
    default: return null;
  }
}
function drawTail(tail, s, color) {
  switch (tail) {
    case 'long':   return <path d={`M ${s*.72} ${s*.6} q ${s*.18} 0,${s*.2} -${s*.14}`} fill="none" stroke={color} strokeWidth={s*.04} strokeLinecap="round"/>;
    case 'spiked': return <path d={`M ${s*.72} ${s*.6} l ${s*.15} -${s*.02} l -${s*.02} -${s*.06}`} fill="none" stroke={color} strokeWidth={s*.04} strokeLinecap="round" strokeLinejoin="round"/>;
    case 'fan':    return <path d={`M ${s*.75} ${s*.58} l ${s*.14} -${s*.08} l -${s*.02} ${s*.1} l ${s*.1} 0 l -${s*.14} ${s*.08} Z`} fill={color}/>;
    case 'curl':   return <path d={`M ${s*.72} ${s*.6} q ${s*.1} -${s*.05},${s*.08} ${s*.05} q -${s*.04} ${s*.05},-${s*.08} 0`} fill="none" stroke={color} strokeWidth={s*.035} strokeLinecap="round"/>;
    case 'nub':    return <circle cx={s*.76} cy={s*.58} r={s*.03} fill={color}/>;
    default: return null;
  }
}
function drawBody(body, s, color) {
  switch (body) {
    case 'oval':   return <ellipse cx={s*.5} cy={s*.56} rx={s*.26} ry={s*.26} fill={color}/>;
    case 'egg':    return <ellipse cx={s*.5} cy={s*.56} rx={s*.24} ry={s*.28} fill={color}/>;
    case 'round':  return <circle  cx={s*.5} cy={s*.55} r={s*.27}  fill={color}/>;
    case 'wide':   return <ellipse cx={s*.5} cy={s*.58} rx={s*.3}  ry={s*.22} fill={color}/>;
    case 'chunky': return <ellipse cx={s*.5} cy={s*.6}  rx={s*.3}  ry={s*.28} fill={color}/>;
    default:       return <ellipse cx={s*.5} cy={s*.56} rx={s*.26} ry={s*.26} fill={color}/>;
  }
}
const STORAGE_BASE = 'https://storage.googleapis.com/pokegoal-app.firebasestorage.app';

function Creature({ stage=0, size=180, type=CREATURE_TYPES.fire, animal=CREATURE_ANIMALS.cat, typeKey='fire', animalKey='cat', variantKey='a', bounce=true, mono=false, monoColor='#111' }) {
  const [useImg, setUseImg] = React.useState(true);
  const imgUrl = `${STORAGE_BASE}/creatures/${animalKey}/${typeKey}/${variantKey}/stage${stage+1}.webp`;
  React.useEffect(() => { setUseImg(true); }, [imgUrl]);

  const s = size, bodyColor = mono ? monoColor : type.color, accent = mono ? monoColor : type.soft, eye = '#fff';
  const renderSVG = () => {
    if (stage === 0) return <g><ellipse cx={s*.5} cy={s*.54} rx={s*.3} ry={s*.36} fill={bodyColor}/><path d={`M ${s*.36} ${s*.54} l ${s*.06} -${s*.04} l ${s*.04} ${s*.05} l ${s*.06} -${s*.05} l ${s*.04} ${s*.05} l ${s*.06} -${s*.04}`} stroke={accent} strokeWidth={s*.022} fill="none" strokeLinecap="round" strokeLinejoin="round"/></g>;
    if (stage === 1) return <g><ellipse cx={s*.5} cy={s*.58} rx={s*.22} ry={s*.24} fill={bodyColor}/><circle cx={s*.43} cy={s*.55} r={s*.024} fill={eye}/><circle cx={s*.57} cy={s*.55} r={s*.024} fill={eye}/><path d={`M ${s*.46} ${s*.64} q ${s*.04} ${s*.02},${s*.08} 0`} stroke={eye} strokeWidth={s*.012} fill="none" strokeLinecap="round"/>{typeGlyph(type,s*.5,s*.75,s*.04,accent)}</g>;
    if (stage === 2) return <g>{drawTail(animal.tail,s,bodyColor)}{drawEars(animal.ears,s,bodyColor)}{drawBody(animal.body,s,bodyColor)}<circle cx={s*.36} cy={s*.6} r={s*.025} fill={accent}/><circle cx={s*.64} cy={s*.6} r={s*.025} fill={accent}/><circle cx={s*.43} cy={s*.53} r={s*.028} fill={eye}/><circle cx={s*.57} cy={s*.53} r={s*.028} fill={eye}/><path d={`M ${s*.46} ${s*.64} q ${s*.04} ${s*.025},${s*.08} 0`} stroke={eye} strokeWidth={s*.014} fill="none" strokeLinecap="round"/>{typeGlyph(type,s*.5,s*.72,s*.04,accent)}</g>;
    return <g><circle cx={s*.5} cy={s*.56} r={s*.44} fill="none" stroke={bodyColor} strokeWidth={s*.006} opacity="0.25" strokeDasharray={`${s*.02} ${s*.02}`}/>{drawTail(animal.tail,s,bodyColor)}{drawEars(animal.ears,s,bodyColor)}{drawBody(animal.body,s,bodyColor)}<path d={`M ${s*.5} ${s*.35} l -${s*.04} ${s*.08} l ${s*.08} 0 Z`} fill={accent}/><circle cx={s*.34} cy={s*.6} r={s*.028} fill={accent}/><circle cx={s*.66} cy={s*.6} r={s*.028} fill={accent}/><path d={`M ${s*.4} ${s*.53} l ${s*.06} -${s*.015} l -${s*.01} ${s*.045} Z`} fill={eye}/><path d={`M ${s*.6} ${s*.53} l -${s*.06} -${s*.015} l ${s*.01} ${s*.045} Z`} fill={eye}/><path d={`M ${s*.46} ${s*.65} q ${s*.04} ${s*.03},${s*.08} 0`} stroke={eye} strokeWidth={s*.015} fill="none" strokeLinecap="round"/>{typeGlyph(type,s*.5,s*.72,s*.055,accent)}</g>;
  };
  return (
    <div style={{ display:'inline-block', animation: bounce ? 'creatureBob 3s ease-in-out infinite' : 'none' }}>
      <style>{`@keyframes creatureBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}`}</style>
      {useImg && !mono
        ? <img src={imgUrl} width={s} height={s} style={{ display:'block', imageRendering:'pixelated' }} onError={() => setUseImg(false)}/>
        : <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} style={{ display:'block' }}>{renderSVG()}</svg>
      }
    </div>
  );
}

function PomodoroModal({ open, onClose, goalName, durationMin = 25 }) {
  const [secs, setSecs] = React.useState(durationMin * 60);
  const [running, setRunning] = React.useState(false);
  const [duration, setDuration] = React.useState(durationMin * 60);
  React.useEffect(() => { if (open) { setSecs(durationMin*60); setDuration(durationMin*60); setRunning(false); } }, [open, durationMin]);
  React.useEffect(() => {
    if (!running) return;
    const id = setInterval(() => setSecs(s => { if (s<=1){setRunning(false);return 0;} return s-1; }), 1000);
    return () => clearInterval(id);
  }, [running]);
  if (!open) return null;
  const pct = 1 - secs/duration, mm = String(Math.floor(secs/60)).padStart(2,'0'), ss2 = String(secs%60).padStart(2,'0');
  return (
    <div style={{ position:'absolute',inset:0,zIndex:100,background:'#111',color:'#fff',display:'flex',flexDirection:'column',animation:'pomoIn 0.3s ease',fontFamily:'-apple-system,system-ui' }}>
      <style>{`@keyframes pomoIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}`}</style>
      <div style={{ padding:'calc(env(safe-area-inset-top,44px) + 18px) 24px 0',display:'flex',justifyContent:'space-between',alignItems:'center' }}>

        <div style={{ display:'flex',gap:8,justifyContent:'center',padding:'0 24px 20px' }}>

}

function NoteModal({ open, initial, onClose, onSave }) {
  const [val, setVal] = React.useState('');
  React.useEffect(() => { if (open) setVal(initial||''); }, [open, initial]);
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position:'absolute',inset:0,zIndex:90,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'flex-end',animation:'noteBg 0.25s ease' }}>
      <style>{`@keyframes noteBg{from{background:rgba(0,0,0,0)}to{background:rgba(0,0,0,0.4)}}@keyframes noteSheet{from{transform:translateY(100%)}to{transform:none}}`}</style>

// ONBOARDING
// ═══════════════════════════════════════════════════════════════

function Onboarding({ onDone, pokedexHistory = [] }) {
  const [step, setStep]         = React.useState(0);
  const [typeKey, setTypeKey]   = React.useState('fire');
  const [animalKey, setAnimalKey] = React.useState('cat');

  const isComboFull = (tKey, aKey) => {
    const used = pokedexHistory.filter(e => e.typeKey === tKey && e.animalKey === aKey).map(e => e.variantKey);
    return ALL_VARIANTS.every(v => used.includes(v));
  };
  const [goalDraft, setGoalDraft] = React.useState(() => DEFAULT_GOALS_RAW.map(g => ({ id:g.id, name:'', iconName:g.iconName })));
  const [activeIcon, setActiveIcon] = React.useState(null);
  const [goalError, setGoalError]   = React.useState(false);
  const type = CREATURE_TYPES[typeKey], animal = CREATURE_ANIMALS[animalKey];
  const TOTAL_STEPS = 5;

  const updateGoal = (idx, patch) => { setGoalError(false); setGoalDraft(d => d.map((g,i) => i===idx ? {...g,...patch} : g)); };
  const deleteGoal = (idx) => { setActiveIcon(null); setGoalDraft(d => d.filter((_,i) => i!==idx)); };

  const handleNext = () => {
    if (step === 3) {
      const filled = goalDraft.filter(g => g.name.trim() !== '');
      if (filled.length === 0) { setGoalError(true); return; }
      setGoalDraft(filled);
    }
    setStep(s => s + 1);
  };

  return (
    <div style={{ height:'100%',background:'#FAFAF7',fontFamily:'-apple-system,system-ui',color:'#111',display:'flex',flexDirection:'column' }}>
      <div style={{ padding:'calc(env(safe-area-inset-top,44px) + 18px) 24px 12px',display:'flex',justifyContent:'space-between',alignItems:'center' }}>
        <div style={{ fontSize:12,color:'#999',letterSpacing:2,textTransform:'uppercase',fontWeight:600 }}>Paso {step+1} de {TOTAL_STEPS}</div>
        <div style={{ display:'flex',gap:4 }}>{Array.from({length:TOTAL_STEPS},(_,i)=><div key={i} style={{ width:20,height:3,borderRadius:2,background:i<=step?'#111':'#E5E2D8' }}/>)}</div>
      </div>
      {step===0 && (
        <div style={{ flex:1,display:'flex',flexDirection:'column',justifyContent:'center',padding:'0 32px',textAlign:'center' }}>
          <div style={{ display:'flex',justifyContent:'center',marginBottom:20 }}>
            <Creature stage={0} size={120} type={CREATURE_TYPES.psychic} animal={CREATURE_ANIMALS.cat} typeKey="psychic" animalKey="cat" variantKey="a"/>
          </div>
          <div style={{ fontSize:32,fontWeight:700,letterSpacing:-0.8,lineHeight:1.15 }}>Tu criatura<br/>nace contigo</div>
          <div style={{ fontSize:15,color:'#666',lineHeight:1.6,marginTop:14 }}>Completa tus metas cada día y evoluciona.</div>
          <div style={{ marginTop:24,padding:'16px 20px',background:'#F5F3EC',borderRadius:16,textAlign:'left' }}>
            <div style={{ fontSize:13,fontWeight:700,color:'#111',marginBottom:6 }}>3 vidas por ciclo</div>
            <div style={{ fontSize:12,color:'#999',lineHeight:1.6 }}>Tienes 3 vidas al mes para fallar. Si las pierdes todas, tu criatura no podrá evolucionar.</div>
          </div>
        </div>
      )}
      {step===1 && (
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          <div style={{ padding:'10px 24px 20px', display:'flex', flexDirection:'column', alignItems:'center', background:type.soft, transition:'background 0.3s ease' }}>
            <Creature stage={0} size={130} type={type} animal={CREATURE_ANIMALS.cat} typeKey={typeKey} animalKey="cat" variantKey="a" bounce={true}/>
            <div style={{ fontSize:18, fontWeight:700, color:type.color, marginTop:6, letterSpacing:-0.3, transition:'color 0.3s' }}>{type.name}</div>
          </div>
          <div style={{ padding:'18px 24px 10px' }}>
            <div style={{ fontSize:24, fontWeight:700, letterSpacing:-0.5 }}>Elige su elemento</div>
          </div>
          <div style={{ flex:1, overflow:'auto', padding:'4px 20px 20px' }}>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:8 }}>
              {Object.entries(CREATURE_TYPES).map(([k,t])=>(
                <button key={k} onClick={()=>setTypeKey(k)} style={{ padding:'10px 4px 12px', border:typeKey===k?`2.5px solid ${t.color}`:'1.5px solid #EFEDE3', background:typeKey===k?t.soft:'#fff', borderRadius:16, cursor:'pointer', fontFamily:'inherit', display:'flex', flexDirection:'column', alignItems:'center', gap:7, transition:'all 0.2s' }}>
                  <div style={{ width:38, height:38, borderRadius:999, background:t.color, display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <svg width={22} height={22} viewBox="0 0 24 24">{typeGlyphIcon(t,'#fff')}</svg>
                  </div>
                  <div style={{ fontSize:10, fontWeight:700, color:typeKey===k?t.color:'#666', textAlign:'center', lineHeight:1.2 }}>{t.name}</div>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
      {step===2 && (
        <div style={{ flex:1, overflow:'auto', padding:'0 20px 20px' }}>
          <div style={{ padding:'4px 4px 18px' }}>
            <div style={{ fontSize:24, fontWeight:700, letterSpacing:-0.5 }}>Elige su tipo</div>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            {Object.entries(CREATURE_ANIMALS).map(([k,a])=>{
              const full = isComboFull(typeKey, k);
              return (
                <button key={k} onClick={()=>{ if(!full) setAnimalKey(k); }} style={{ padding:'18px 12px 14px', border:animalKey===k?`2.5px solid ${type.color}`:'1.5px solid #EFEDE3', background:full?'#F5F5F5':animalKey===k?type.soft:'#fff', borderRadius:20, cursor:full?'default':'pointer', fontFamily:'inherit', display:'flex', flexDirection:'column', alignItems:'center', gap:8, transition:'all 0.2s', position:'relative', opacity:full?0.6:1 }}>
                  {!full && animalKey===k && <div style={{ position:'absolute', top:10, right:10, width:8, height:8, borderRadius:999, background:type.color }}/>}
                  {full && <div style={{ position:'absolute', top:8, right:8, background:'#888', color:'#fff', fontSize:9, fontWeight:700, letterSpacing:0.5, borderRadius:6, padding:'2px 6px', textTransform:'uppercase' }}>Completado</div>}
                  <div style={{ filter: full ? 'grayscale(1)' : 'none', transition:'filter 0.2s' }}>
                    <Creature stage={0} size={90} type={type} animal={a} typeKey={typeKey} animalKey={k} variantKey="a" bounce={!full && animalKey===k}/>
                  </div>
                  <div style={{ fontSize:13, fontWeight:700, color:full?'#AAA':animalKey===k?'#111':'#555' }}>{a.name}</div>
                </button>
              );
            })}
          </div>
        </div>
      )}
      {step===3 && (
        <div style={{ flex:1,overflow:'auto',padding:'4px 20px 20px' }}>
          <div style={{ padding:'4px 4px 14px' }}>
            <div style={{ fontSize:24,fontWeight:700,letterSpacing:-0.5 }}>Define tus metas</div>
            <div style={{ fontSize:14,color:'#999',marginTop:4 }}>Lo que harás cada día. Puedes tener de 1 a 3.</div>
            <div style={{ display:'flex',alignItems:'flex-start',gap:6,marginTop:10,background:'#FFF8EC',border:'1px solid #FFE4A0',borderRadius:10,padding:'10px 12px' }}>
              <span style={{ fontSize:15,lineHeight:1 }}>⚠️</span>
              <span style={{ fontSize:12,color:'#A06800',lineHeight:1.5 }}>Solo puedes editar tus metas el primer día. Al avanzar, quedarán congeladas hasta que termine el ciclo de 30 días.</span>
            </div>
          </div>
          {goalError && (
            <div style={{ background:'#FFF3F0',border:'1px solid #FFD5C8',borderRadius:12,padding:'12px 14px',marginBottom:12,fontSize:13,color:'#C0391B' }}>
              Agrega al menos una meta para continuar.
            </div>
          )}
          {goalDraft.map((goal, idx) => {
            const Icon = ICON_MAP[goal.iconName] || IconBook;
            const isOpen = activeIcon === idx;
            return (
              <div key={goal.id} style={{ background:'#fff',border:'1px solid #EFEDE3',borderRadius:16,padding:'14px 16px',marginBottom:10 }}>
                <div style={{ display:'flex',alignItems:'center',gap:12 }}>
                  <button onClick={()=>setActiveIcon(isOpen?null:idx)} style={{ width:42,height:42,borderRadius:12,background:'#F5F3EC',border:isOpen?'2px solid #111':'2px solid transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0 }}>
                    <Icon size={20} color="#111"/>
                  </button>
                  <input value={goal.name} onChange={e=>updateGoal(idx,{name:e.target.value})} placeholder="Nombre de la meta" style={{ flex:1,fontSize:16,fontWeight:600,color:'#111',border:'none',background:'transparent',outline:'none',fontFamily:'inherit' }}/>
                  {goalDraft.length > 1 && (
                    <button onClick={()=>deleteGoal(idx)} style={{ width:32,height:32,borderRadius:999,background:'#F5F3EC',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0 }}>
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#BBB" strokeWidth="2.5" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                  )}
                </div>
                {isOpen && (
                  <div style={{ display:'flex',gap:8,flexWrap:'wrap',marginTop:12,paddingTop:12,borderTop:'1px solid #F0EDE4' }}>
                    {ICON_OPTIONS.map(opt=>(
                      <button key={opt.name} onClick={()=>{updateGoal(idx,{iconName:opt.name});setActiveIcon(null);}} style={{ width:42,height:42,borderRadius:11,background:goal.iconName===opt.name?'#111':'#F5F3EC',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer' }}>
                        <opt.Icon size={20} color={goal.iconName===opt.name?'#fff':'#555'}/>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
      {step===4 && (
        <div style={{ flex:1,display:'flex',flexDirection:'column',justifyContent:'center',padding:'0 28px',textAlign:'center' }}>
          <div style={{ fontSize:11,color:'#999',letterSpacing:2,textTransform:'uppercase',fontWeight:600 }}>Tu compañero</div>
          <div style={{ display:'flex',justifyContent:'center',margin:'12px 0' }}>
            <div style={{ width:180,height:180,borderRadius:999,background:type.soft,display:'flex',alignItems:'center',justifyContent:'center' }}>
              <Creature stage={0} size={130} type={type} animal={animal} typeKey={typeKey} animalKey={animalKey} variantKey="a"/>
            </div>
          </div>
          <div style={{ fontSize:24,fontWeight:700,letterSpacing:-0.4 }}>{animal.name} · {type.name}</div>
          <div style={{ fontSize:14,color:'#666',marginTop:6,lineHeight:1.6 }}>Eclosiona al día 10 · Evoluciona al 20 · Forma final al 30.</div>
          <div style={{ marginTop:18,padding:'14px 18px',background:'#F5F3EC',borderRadius:16,textAlign:'left' }}>
            <div style={{ fontSize:13,fontWeight:700,color:'#111',marginBottom:6 }}>Carácter aleatorio</div>
            <div style={{ fontSize:13,color:'#666',marginBottom:8 }}>Héroe · Villano · Mago</div>
            <div style={{ fontSize:12,color:'#999',lineHeight:1.6 }}>Tu criatura recibirá un carácter al azar. Al completar su evolución, ese carácter ya no te volverá a tocar.</div>
          </div>
        </div>
      )}
      <div style={{ padding:'12px 20px calc(env(safe-area-inset-bottom,0px) + 28px)',display:'flex',gap:10 }}>
        {step>0 && <button onClick={()=>setStep(s=>s-1)} style={{ padding:'16px 22px',background:'#F5F3EC',border:'none',borderRadius:14,fontSize:15,fontWeight:600,color:'#111',fontFamily:'inherit',cursor:'pointer' }}>Atrás</button>}
        <button onClick={()=>{ if(step<4) handleNext(); else onDone({typeKey,animalKey,goalDraft}); }} style={{ flex:1,padding:'16px',background:'#111',border:'none',borderRadius:14,fontSize:15,fontWeight:600,color:'#fff',fontFamily:'inherit',cursor:'pointer' }}>{step===4?'Empezar':'Siguiente'}</button>
      </div>
    </div>
  );
}

const STAGE_THRESHOLDS = [0, 10, 20, 30];

const ANIMAL_ORDER  = ['cat','dragon','bird','amphibian','bear'];
const TYPE_ORDER    = ['fire','water','psychic','grass','electric'];
const VARIANT_ORDER = ['a','b','c'];
function creatureNumber(animalKey, typeKey, variantKey) {
  const ai = ANIMAL_ORDER.indexOf(animalKey);
  const ti = TYPE_ORDER.indexOf(typeKey);
  const vi = VARIANT_ORDER.indexOf(variantKey || 'a');
  if (ai < 0 || ti < 0 || vi < 0) return 0;
  return ai * 15 + ti * 3 + vi + 1;
}

        <button onClick={()=>{}} style={{ padding:'16px', background:'#F5F3EC', border:'1px solid #EFEDE3', borderRadius:14, fontSize:15, fontWeight:600, color:'#BBB', fontFamily:'inherit', cursor:'default' }}>
          Compartir logro
        </button>
        <button onClick={onContinue} style={{ padding:'16px', background:'#111', border:'none', borderRadius:14, fontSize:15, fontWeight:700, color:'#fff', fontFamily:'inherit', cursor:'pointer' }}>
          Elegir nueva criatura
        </button>
      </div>
    </div>
  );
}

function Pokedex({ entries=[], onBack }) {
  const VARIANT_LABEL = { a:'Héroe', b:'Villano', c:'Mago' };
  return (
    <div style={{ height:'100%',background:'#FAFAF7',fontFamily:'-apple-system,system-ui',color:'#111',display:'flex',flexDirection:'column' }}>
      <div style={{ padding:'calc(env(safe-area-inset-top,44px) + 18px) 24px 16px',display:'flex',alignItems:'center',gap:14 }}>
        <button onClick={onBack} style={{ width:40,height:40,borderRadius:999,background:'#fff',border:'1px solid #EFEDE3',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#111' }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div><div style={{ fontSize:11,color:'#999',letterSpacing:2,textTransform:'uppercase',fontWeight:600 }}>Mi colección</div><div style={{ fontSize:26,fontWeight:700,letterSpacing:-0.4,marginTop:1 }}>Criaturas</div></div>
      </div>
      <div style={{ margin:'0 20px 16px',padding:'14px 18px',background:'#111',color:'#fff',borderRadius:16,display:'flex',justifyContent:'space-around',textAlign:'center' }}>
        {[['Criaturas', entries.length],['Completas', entries.filter(e=>e.daysReached>=30).length],['Días totales', entries.reduce((s,e)=>s+e.daysReached,0)]].map(([label,val],i,arr)=>(
          <React.Fragment key={label}>
            <div><div style={{ fontSize:22,fontWeight:700 }}>{val}</div><div style={{ fontSize:10,color:'rgba(255,255,255,0.6)',letterSpacing:1.5,textTransform:'uppercase' }}>{label}</div></div>
            {i<arr.length-1 && <div style={{ width:1,background:'rgba(255,255,255,0.15)' }}/>}
          </React.Fragment>
        ))}
      </div>
      <div style={{ flex:1,overflow:'auto',padding:'4px 20px calc(env(safe-area-inset-bottom,0px) + 28px)',display:'flex',flexDirection:'column',gap:12 }}>
        {entries.map(e=>{
          const type=CREATURE_TYPES[e.typeKey], animal=CREATURE_ANIMALS[e.animalKey];
          const complete=e.daysReached>=30, broken=!e.current&&!complete;
          const variantKey=e.variantKey||'a';
          return (
            <div key={e.id} style={{ background:'#fff',border:e.current?`2px solid ${type.color}`:'1px solid #EFEDE3',borderRadius:18,padding:16,position:'relative' }}>
              {/* Header */}
              <div style={{ display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14 }}>
                <div>
                  <div style={{ fontSize:10,color:'#BBB',letterSpacing:1,fontWeight:600,marginBottom:2 }}>#{String(creatureNumber(e.animalKey,e.typeKey,e.variantKey)).padStart(3,'0')}</div>
                  <div style={{ fontSize:16,fontWeight:700,letterSpacing:-0.3,color:broken?'#888':'#111' }}>{animal.name} <span style={{ color:type.color }}>·</span> {type.name}</div>
                  <div style={{ fontSize:11,color:'#AAA',marginTop:2 }}>{VARIANT_LABEL[variantKey]} · {e.reason}</div>
                </div>
                {e.current
                  ? <div style={{ fontSize:9,letterSpacing:1.5,fontWeight:700,background:type.color,color:'#fff',padding:'4px 8px',borderRadius:999 }}>ACTUAL</div>
                  : complete
                  ? <div style={{ fontSize:9,letterSpacing:1.5,fontWeight:700,background:'#111',color:'#fff',padding:'4px 8px',borderRadius:999 }}>COMPLETA</div>
                  : <div style={{ fontSize:9,letterSpacing:1.5,fontWeight:700,background:'#F0EDE3',color:'#999',padding:'4px 8px',borderRadius:999 }}>FALLIDA</div>
                }
              </div>
              {/* 4 evolution slots */}
              <div style={{ display:'flex',gap:8 }}>
                {[0,1,2,3].map(s=>{
                  const unlocked = e.daysReached >= STAGE_THRESHOLDS[s] && (s===0 ? e.daysReached > 0 : e.daysReached >= STAGE_THRESHOLDS[s]);
                  const isCurrentStage = s === creatureStageFor(e.daysReached) && e.current;
                  const slotBg = unlocked ? (broken ? '#F5F3EC' : type.soft) : '#F0EEE6';
                  return (
                    <div key={s} style={{ flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:5 }}>
                      <div style={{ width:'100%',height:78,borderRadius:12,background:slotBg,display:'flex',alignItems:'center',justifyContent:'center',border:isCurrentStage?`2px solid ${type.color}`:'2px solid transparent',position:'relative' }}>
                        {unlocked
                          ? <Creature stage={s} size={60} type={type} animal={animal} typeKey={e.typeKey} animalKey={e.animalKey} variantKey={variantKey} bounce={isCurrentStage} mono={broken}/>
                          : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#CCC" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                        }
                      </div>
                      <div style={{ fontSize:9,fontWeight:600,letterSpacing:0.5,color:unlocked?(broken?'#AAA':type.color):'#CCC',textAlign:'center' }}>{STAGE_NAMES[s]}</div>
                    </div>
                  );
                })}
              </div>
              {/* Footer */}
              <div style={{ marginTop:12,fontSize:11,color:'#BBB',display:'flex',justifyContent:'space-between' }}>
                <span>Días alcanzados: <b style={{ color:'#888' }}>{e.daysReached}/30</b></span>
                <span>{e.startedAt} {e.endedAt && e.endedAt!=='—' ? `→ ${e.endedAt}`:''}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function GoalTile({ goal, onToggle, onPomodoro, type }) {
  const Icon = goal.icon;
  return (
    <div onClick={onToggle} style={{ display:'flex',alignItems:'center',gap:14,background:goal.done?'#111':'#fff',border:goal.done?'1px solid #111':'1px solid #EFEDE3',borderRadius:16,padding:'14px 16px',cursor:'pointer',transition:'all 0.25s ease' }}>
      <div style={{ width:36,height:36,borderRadius:10,background:goal.done?'rgba(255,255,255,0.1)':(type?type.soft:'#F5F3EC'),display:'flex',alignItems:'center',justifyContent:'center',color:goal.done?'#fff':'#111' }}><Icon size={20} weight={2}/></div>
      <div style={{ flex:1 }}>
        <div style={{ fontSize:16,fontWeight:600,color:goal.done?'#fff':'#111',letterSpacing:-0.2 }}>{goal.name}</div>
        <div style={{ fontSize:12,color:goal.done?'rgba(255,255,255,0.5)':'#999',marginTop:1 }}>{goal.done?`Hecho · ${goal.streak} días seguidos`:`Racha ${goal.streak}`}</div>
      </div>
      {onPomodoro && !goal.done && (
        <button onClick={e=>{e.stopPropagation();onPomodoro();}} style={{ width:32,height:32,borderRadius:8,border:'1px solid #EFEDE3',background:'transparent',color:'#666',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer' }}><IconTimer size={16} weight={1.8}/></button>
      )}
      <div style={{ width:28,height:28,borderRadius:999,border:goal.done?'none':'2px solid #DDD8C8',background:goal.done?'#fff':'transparent',display:'flex',alignItems:'center',justifyContent:'center' }}>{goal.done&&<IconCheck size={16} color="#111" weight={3}/>}</div>
    </div>
  );
}

function VariantSerenity({ data, onToggle, onOpenPomodoro, onOpenNote, onOpenPokedex, onOpenSettings, onClearJustEvolved }) {
  const { goals, streak, totalDays, failedDays=0, note, type, animal, typeKey, animalKey, variantKey, justEvolved=false, dailyLog=[], startedAt, cycleNumber=1 } = data;
  const completed = goals.filter(g=>g.done).length, pct = completed/goals.length, stage = creatureStageFor(totalDays), nextAt = STAGE_NEXT[stage];
  const now = new Date();
  const dayName = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'][now.getDay()];
  const dateStr = `${now.getDate()} ${'enero,febrero,marzo,abril,mayo,junio,julio,agosto,septiembre,octubre,noviembre,diciembre'.split(',')[now.getMonth()]}`;
  const VARIANT_LABEL = { a:'Héroe', b:'Villano', c:'Mago' };
  const VARIANT_COLOR = { a:'#B8860B', b:'#C0392B', c:'#7B2FBE' };
  const VARIANT_SOFT  = { a:'#FFF8DC', b:'#FDEDEC', c:'#F5EEFF' };
  const variantIcon = variantKey === 'a'
    ? <path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z" fill={VARIANT_COLOR[variantKey]} stroke="none"/>
    : variantKey === 'b'
    ? <path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z" fill={VARIANT_COLOR[variantKey]} stroke="none"/>
    : <path d="M12 3c1 2 2 4 1 6 2-1 4-1 5 1-2 0-4 1-4 3 1 2 1 4-1 5-1-2-1-4-3-4-2 0-3 2-4 1 1-2 2-4 0-5 2 0 3-2 3-4-1-2 0-4 3-3z" fill={VARIANT_COLOR[variantKey]} stroke="none"/>;

  // ── Animations ──
  const [celebrating, setCelebrating]     = React.useState(false);
  const [evolving, setEvolving]           = React.useState(false);
  const [shakingHearts, setShakingHearts] = React.useState(false);
  const [previewStage, setPreviewStage]   = React.useState(null);
  const prevCompleted   = React.useRef(completed);
  const prevFailedDays  = React.useRef(null);

  // Creature info tooltip
  const [showCreatureInfo, setShowCreatureInfo] = React.useState(false);

  // Milestone de racha
  const MILESTONES = [7, 14, 21, 30];
  const [showMilestone, setShowMilestone] = React.useState(() => MILESTONES.includes(streak) && streak > 0);
  React.useEffect(() => {
    if (showMilestone) { const t = setTimeout(() => setShowMilestone(false), 4000); return () => clearTimeout(t); }
  }, [showMilestone]);

  // Mini historial semanal
  const weekDots = React.useMemo(() => {
    const todayD = new Date();
    const todayStr2 = todayD.toISOString().slice(0,10);
    const dow = todayD.getDay();
    const monday = new Date(todayD);
    monday.setDate(todayD.getDate() - ((dow + 6) % 7));
    return ['L','M','X','J','V','S','D'].map((label, i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      const dStr = d.toISOString().slice(0,10);
      if (dStr > todayStr2) return { label, state: 'future' };
      if (dStr === todayStr2) return { label, state: completed === goals.length ? 'done' : 'today' };
      if (!startedAt || dStr < startedAt) return { label, state: 'empty' };
      const diffDays = Math.round((d - new Date(startedAt + 'T00:00:00')) / 86400000);
      if (diffDays < 0 || diffDays >= dailyLog.length) return { label, state: 'empty' };
      return { label, state: dailyLog[diffDays] ? 'done' : 'missed' };
    });
  }, [dailyLog, startedAt, completed, goals.length]);

  // Urgencia nocturna
  const urgencyText = React.useMemo(() => {
    const h = now.getHours();
    if (h < 19 || completed === goals.length) return null;
    const hoursLeft = 23 - h;
    if (hoursLeft === 0) return 'Menos de 1 hora del día';
    return `${hoursLeft}h ${59 - now.getMinutes()}m para cerrar el día`;
  }, []);

  // Progreso de etapa
  const stageStarts = [0, 10, 20, 30];
  const stageEnds   = [10, 20, 30, 30];
  const stagePct    = stage === 3 ? 1 : Math.min((totalDays - stageStarts[stage]) / (stageEnds[stage] - stageStarts[stage]), 1);

  const displayStage = previewStage !== null ? previewStage : stage;

  React.useEffect(() => {
    if (completed === goals.length && prevCompleted.current < goals.length) {
      setCelebrating(true);
      setTimeout(() => setCelebrating(false), 3200);
      if (creatureStageFor(totalDays + 1) > creatureStageFor(totalDays)) {
        setTimeout(() => {
          setEvolving(true);
          setTimeout(() => setEvolving(false), 1800);
        }, 600);
        // Cambiar imagen en el pico del brillo (~1.3s total)
        setTimeout(() => setPreviewStage(stage + 1), 1300);
      }
    }
    if (completed < goals.length && previewStage !== null) setPreviewStage(null);
    prevCompleted.current = completed;
  }, [completed]);

  React.useEffect(() => {
    if (prevFailedDays.current !== null && failedDays > prevFailedDays.current) {
      setShakingHearts(true);
      setTimeout(() => setShakingHearts(false), 900);
    }
    prevFailedDays.current = failedDays;
  }, [failedDays]);

  // Shake on mount if already has failed days
  React.useEffect(() => {
    if (failedDays > 0) { setShakingHearts(true); setTimeout(() => setShakingHearts(false), 900); }
  }, []);

  const particles = React.useMemo(() => Array.from({length: 22}, (_, i) => ({
    id: i,
    left: 15 + Math.random() * 70,
    delay: Math.random() * 0.7,
    duration: 1.4 + Math.random() * 0.9,
    color: ['#FFD700','#FFFFFF','#1F6FD9','#FFE54C','#BFDFFF','#FFC200','#4A90D9'][i % 7],
    size: 7 + Math.round(Math.random() * 7),
    circle: i % 3 !== 0,
  })), []);

  return (
    <div style={{ height:'100%',background:'#FAFAF7',display:'flex',flexDirection:'column',fontFamily:'-apple-system,system-ui',overflow:'auto',position:'relative' }}>
      <style>{`
        @keyframes confetti {
          0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
          100% { transform: translateY(-85vh) rotate(540deg) scale(0.4); opacity: 0; }
        }
        @keyframes evolutionPulse {
          0%   { filter: none; transform: scale(1); }
          20%  { filter: drop-shadow(0 0 18px #FFD700) drop-shadow(0 0 36px #FFD700); transform: scale(1.13) rotate(-3deg); }
          40%  { filter: drop-shadow(0 0 28px #FFD700); transform: scale(1.08) rotate(3deg); }
          60%  { filter: drop-shadow(0 0 22px #FFD700); transform: scale(1.11) rotate(-2deg); }
          80%  { filter: drop-shadow(0 0 10px #FFD700); transform: scale(1.04); }
          100% { filter: none; transform: scale(1); }
        }
        @keyframes heartShake {
          0%,100% { transform: translateX(0) rotate(0deg); }
          15%  { transform: translateX(-5px) rotate(-10deg); }
          35%  { transform: translateX(5px)  rotate(10deg);  }
          55%  { transform: translateX(-3px) rotate(-6deg);  }
          75%  { transform: translateX(3px)  rotate(6deg);   }
        }
      `}</style>
      {celebrating && (
        <div style={{ position:'absolute',inset:0,pointerEvents:'none',zIndex:30,overflow:'hidden' }}>
          {particles.map(p=>(
            <div key={p.id} style={{ position:'absolute', left:`${p.left}%`, top:'45%', width:p.size, height:p.circle?p.size:p.size*0.6, borderRadius:p.circle?'50%':'3px', background:p.color, animation:`confetti ${p.duration}s ${p.delay}s ease-out forwards` }}/>
          ))}
        </div>
      )}
      {/* Top bar */}
      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',padding:'calc(env(safe-area-inset-top,44px) + 18px) 20px 0' }}>
        <div>
          <div style={{ fontSize:12,color:'#999',letterSpacing:1.5,textTransform:'uppercase',fontWeight:600 }}>{dayName}</div>
          <div style={{ fontSize:22,color:'#111',fontWeight:600,letterSpacing:-0.4,marginTop:2 }}>{dateStr}</div>
          {urgencyText && <div style={{ fontSize:11,color:'#D97706',fontWeight:600,marginTop:2 }}>⏰ {urgencyText}</div>}
        </div>
        <div style={{ display:'flex',gap:8 }}>
          <button onClick={onOpenPokedex} style={{ height:36,padding:'0 12px',display:'flex',alignItems:'center',gap:5,background:'#fff',color:'#111',border:'1px solid #EFEDE3',borderRadius:999,fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit' }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8" cy="9" r="2"/><path d="M3 13h18"/></svg>
            Criaturas
          </button>
          <button onClick={onOpenSettings} style={{ width:36,height:36,borderRadius:999,background:'#fff',border:'1px solid #EFEDE3',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer' }}><IconGear size={16} color="#666"/></button>
        </div>
      </div>
      {/* Mini historial semanal */}
      <div style={{ display:'flex',alignItems:'flex-end',gap:6,padding:'10px 20px 0' }}>
        {weekDots.map((dot, i) => (
          <div key={i} style={{ display:'flex',flexDirection:'column',alignItems:'center',gap:3 }}>
            <div style={{ width:11,height:11,borderRadius:3,
              background: dot.state==='done' ? '#2F8B3F' : dot.state==='missed' ? '#E8534A' : dot.state==='today' ? '#E5E2D8' : '#F0EDE4',
              outline: dot.state==='today' ? '1.5px solid #BBB' : 'none', outlineOffset:1
            }}/>
            <span style={{ fontSize:9,fontWeight:700,color: dot.state==='today'?'#666':'#CCC',letterSpacing:0.3 }}>{dot.label}</span>
          </div>
        ))}
      </div>
      {/* Milestone banner */}
      {showMilestone && (
        <div style={{ margin:'10px 20px 0',background:'linear-gradient(135deg,#D97706,#F59E0B)',borderRadius:12,padding:'10px 16px',display:'flex',alignItems:'center',gap:8,animation:'milestoneIn 0.4s cubic-bezier(0.2,0.8,0.3,1)' }}>
          <style>{`@keyframes milestoneIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}`}</style>
          <span style={{ fontSize:18 }}>🔥</span>
          <div>
            <div style={{ fontSize:13,fontWeight:700,color:'#fff' }}>¡{streak} días seguidos!</div>
            <div style={{ fontSize:11,color:'rgba(255,255,255,0.8)' }}>Sigue así, no lo rompas</div>
          </div>
        </div>
      )}
      {/* Stats strip */}
      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 20px 0' }}>
        <div style={{ display:'flex',alignItems:'center',gap:6 }}>
          <div style={{ display:'flex',alignItems:'center',gap:6,background:VARIANT_SOFT[variantKey],padding:'6px 12px',borderRadius:999 }}>
            <svg width="13" height="13" viewBox="0 0 24 24">{variantIcon}</svg>
            <span style={{ fontSize:12,fontWeight:700,color:VARIANT_COLOR[variantKey],letterSpacing:0.3 }}>{VARIANT_LABEL[variantKey]}</span>
          </div>
          <div style={{ fontSize:11,fontWeight:600,color:'#BBB',letterSpacing:0.3 }}>Criatura #{cycleNumber}</div>
        </div>
        <div style={{ display:'flex',alignItems:'center',gap:8 }}>
          <div style={{ display:'flex',alignItems:'center',gap:3, animation: shakingHearts ? 'heartShake 0.9s ease' : 'none' }}>
            {[0,1,2].map(i=>(
              <svg key={i} width="14" height="14" viewBox="0 0 24 24" fill={i>=failedDays?'#D94A1F':'none'} stroke={i>=failedDays?'#D94A1F':'#CCC'} strokeWidth="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            ))}
          </div>
          <div style={{ display:'flex',alignItems:'center',gap:5,background:MILESTONES.includes(streak)?'#D97706':'#111',color:'#fff',padding:'0 12px',height:32,borderRadius:999,transition:'background 0.3s' }}>
            <IconFlame size={12} color="#fff" weight={2.2}/>
            <span style={{ fontSize:12,fontWeight:600 }}>{streak}</span>
          </div>
        </div>
      </div>
      <div style={{ display:'flex',justifyContent:'center',marginTop:22,position:'relative' }}>
        <svg width={260} height={260} viewBox="0 0 260 260">
          <circle cx="130" cy="130" r="116" fill="none" stroke="#ECEAE2" strokeWidth="10"/>
          <circle cx="130" cy="130" r="116" fill="none" stroke={type.color} strokeWidth="10" strokeLinecap="round" strokeDasharray={`${2*Math.PI*116}`} strokeDashoffset={`${2*Math.PI*116*(1-pct)}`} transform="rotate(-90 130 130)" style={{ transition:'stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1)' }}/>
          {goals.map((g,i)=>{ const angle=(i/goals.length)*2*Math.PI-Math.PI/2, x=130+Math.cos(angle)*116, y=130+Math.sin(angle)*116; return <circle key={g.id} cx={x} cy={y} r="5" fill={g.done?type.color:'#FAFAF7'} stroke={type.color} strokeWidth="2"/>; })}
        </svg>
        <div style={{ position:'absolute',top:0,left:0,right:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center' }}>
          <div style={{ animation: evolving ? 'evolutionPulse 1.8s ease forwards' : 'none' }} onClick={()=>setShowCreatureInfo(v=>!v)}>
            <Creature stage={displayStage} size={140} type={type} animal={animal} typeKey={typeKey} animalKey={animalKey} variantKey={variantKey}/>
          </div>
        </div>
        {/* Creature info tooltip */}
        {showCreatureInfo && (
          <div onClick={()=>setShowCreatureInfo(false)} style={{ position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',zIndex:10,background:'rgba(17,17,17,0.92)',color:'#fff',borderRadius:16,padding:'12px 18px',textAlign:'center',backdropFilter:'blur(8px)',pointerEvents:'auto',animation:'milestoneIn 0.2s ease',minWidth:160 }}>
            <div style={{ fontSize:14,fontWeight:700 }}>{animal.name} {type.name}</div>
            <div style={{ fontSize:11,color:'rgba(255,255,255,0.6)',marginTop:2 }}>{VARIANT_LABEL[variantKey]} · {STAGE_NAMES[stage]}</div>
            <div style={{ fontSize:11,color:type.color,marginTop:6,fontWeight:600 }}>
              {stage < 3 ? `${nextAt - totalDays} días para evolucionar` : '¡Forma final alcanzada!'}
            </div>
          </div>
        )}
      </div>
      <div style={{ textAlign:'center',fontSize:10,color:'#999',letterSpacing:1.5,fontWeight:600,textTransform:'uppercase',marginTop:6 }}>{STAGE_NAMES[stage]} · día {totalDays}/30</div>
      <div style={{ textAlign:'center',marginTop:4 }}>
        <div style={{ fontSize:36,fontWeight:700,color:'#111',letterSpacing:-1 }}>{completed}<span style={{ color:'#C8C4B7' }}>/{goals.length}</span></div>
        {completed === goals.length
          ? <div style={{ fontSize:13,color:'#2F8B3F',fontWeight:600,marginTop:-2 }}>¡Día perfecto!</div>
          : stage < 3
          ? <div style={{ padding:'6px 24px 0' }}>
              <div style={{ display:'flex',justifyContent:'space-between',fontSize:10,color:'#BBB',marginBottom:4 }}>
                <span>{STAGE_NAMES[stage]}</span>
                <span>{nextAt - totalDays} días</span>
              </div>

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE HELPERS
// ═══════════════════════════════════════════════════════════════

const ICON_MAP = { dumbbell:IconDumbbell, lotus:IconLotus, book:IconBook, run:IconRun, water:IconWater, brain:IconBrain, heart:IconHeartGoal, moon:IconMoon, pencil:IconPencil };

const DEFAULT_GOALS_RAW = [
  { id:'exercise', name:'Hacer ejercicio', iconName:'dumbbell', done:false, streak:0 },
  { id:'meditate', name:'Meditar',         iconName:'lotus',    done:false, streak:0 },
  { id:'read',     name:'Leer',            iconName:'book',     done:false, streak:0 },
];

function todayStr() { return new Date().toISOString().slice(0,10); }
function hydrateGoals(goals) { return goals.map(g=>({...g, icon: ICON_MAP[g.iconName]||IconBook})); }
function dehydrateGoals(goals) { return goals.map(({icon,...rest})=>rest); }

function defaultAppState() {
  return { hasOnboarded:false, typeKey:'psychic', animalKey:'cat', variantKey:'a', goals:DEFAULT_GOALS_RAW, streak:0, totalDays:0, failedDays:0, lastDate:todayStr(), note:'', startedAt:todayStr(), pokedexHistory:[], dailyLog:[], lastCreature:null };
}

function migrateState(state) {
  const animalMap = { frog: 'amphibian', rodent: 'cat' };
  const migrateAnimal = k => animalMap[k] || k;
  return {
    ...state,
    animalKey: migrateAnimal(state.animalKey),
    variantKey: state.variantKey || 'a',
    failedDays: state.failedDays || 0,
    dailyLog: state.dailyLog || [],
    lastCreature: state.lastCreature || null,
    pokedexHistory: (state.pokedexHistory || []).map(e => ({
      ...e,
      animalKey: migrateAnimal(e.animalKey),
      variantKey: e.variantKey || 'a',
    })),
  };
}

const MAX_FAILED_DAYS = 3;

function rolloverIfNeeded(state) {
  const today = todayStr();
  if (state.lastDate === today) return state;
  const allDone = state.goals.every(g=>g.done);
  let { streak, totalDays, failedDays=0, pokedexHistory, typeKey, animalKey, variantKey, startedAt, dailyLog=[], goalLog={} } = state;
  let newStartedAt = startedAt || today;
  dailyLog = [...dailyLog, allDone];
  const newGoalLog = {};
  state.goals.forEach(g => { newGoalLog[g.id] = [...(goalLog[g.id]||[]), g.done]; });
  goalLog = newGoalLog;
  if (allDone) {
    streak++; totalDays++;
    if (totalDays >= 30) {
      const lastCreature = { typeKey, animalKey, variantKey, dailyLog, goalLog, goalNames: state.goals.map(g=>({id:g.id,name:g.name})), startedAt:newStartedAt, endedAt:state.lastDate };
      pokedexHistory = [...pokedexHistory, { id:Date.now(), typeKey, animalKey, variantKey, daysReached:30, startedAt:newStartedAt, endedAt:state.lastDate, reason:'completado ✓' }];
      return { ...state, streak:0, totalDays:0, failedDays:0, lastDate:today, goals:state.goals.map(g=>({...g,done:false})), note:'', startedAt:today, pokedexHistory, dailyLog:[], goalLog:{}, lastCreature, needsNewCreature:true, justEvolved:false };
    }
  } else {
    streak = 0;
    failedDays++;
    if (failedDays >= MAX_FAILED_DAYS) {
      pokedexHistory = [...pokedexHistory, { id:Date.now(), typeKey, animalKey, variantKey, daysReached:totalDays, startedAt:newStartedAt, endedAt:state.lastDate, reason:'3 días fallados 💀' }];
      totalDays=0; failedDays=0; newStartedAt=today; dailyLog=[]; goalLog={};
      variantKey = pickVariant(typeKey, animalKey, pokedexHistory);
    }
  }
  const prevStageVal = creatureStageFor(state.totalDays);
  const nextStageVal = creatureStageFor(totalDays);
  const justEvolved  = nextStageVal > prevStageVal && totalDays > 0;
  return { ...state, streak, totalDays, failedDays, variantKey, lastDate:today, goals:state.goals.map(g=>({...g,done:false})), note:'', startedAt:newStartedAt, pokedexHistory, dailyLog, justEvolved };
}

function App() {
  const [authLoading, setAuthLoading] = React.useState(true);
  const [user, setUser]               = React.useState(null);
  const [dataLoading, setDataLoading] = React.useState(false);
  const [appState, setAppState]       = React.useState(null);
  const [screen, setScreen]           = React.useState('home');
  const [pomo, setPomo]               = React.useState(null);
  const [noteOpen, setNoteOpen]       = React.useState(false);
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const saveTimer                     = React.useRef(null);
  const isFirstLoad                   = React.useRef(true);

  // Auth listener
  React.useEffect(() => {
    return auth.onAuthStateChanged(u => { setUser(u); setAuthLoading(false); });
  }, []);

  // Load data when user logs in
  React.useEffect(() => {
    if (!user) { setAppState(null); return; }
    setDataLoading(true);
    db.collection('users').doc(user.uid).collection('data').doc('state')
      .get()
      .then(doc => {
        let raw = doc.exists ? rolloverIfNeeded(migrateState(doc.data())) : defaultAppState();
        setAppState({ ...raw, goals: hydrateGoals(raw.goals) });
        setScreen(raw.needsNewCreature && raw.lastCreature ? 'celebration' : raw.needsNewCreature ? 'onboard' : raw.hasOnboarded ? 'home' : 'onboard');
        isFirstLoad.current = false;
      })
      .catch(() => {
        const raw = defaultAppState();
        setAppState({ ...raw, goals: hydrateGoals(raw.goals) });
        setScreen('onboard');
        isFirstLoad.current = false;
      })
      .finally(() => setDataLoading(false));
  }, [user]);

  // Save to Firestore (debounced 800ms)
  React.useEffect(() => {
    if (!user || !appState || dataLoading) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      db.collection('users').doc(user.uid).collection('data').doc('state')
        .set({ ...appState, goals: dehydrateGoals(appState.goals) })
        .catch(() => {});
    }, 800);
  }, [appState]);

  const update = patch => setAppState(s => ({...s, ...patch}));

  const toggleGoal = id => setAppState(s => ({
    ...s,
    goals: s.goals.map(g => g.id===id ? {...g, done:!g.done, streak:g.done?g.streak-1:g.streak+1} : g),
  }));

  const handleSaveGoals = (draftGoals) => {
    setAppState(s => ({
      ...s,
      goals: draftGoals.map(dg => {
        const existing = s.goals.find(g => g.id === dg.id);
        return { ...existing, name:dg.name, iconName:dg.iconName, icon: ICON_MAP[dg.iconName] || IconBook };
      })
    }));
  };

  const handleOnboardDone = ({typeKey, animalKey, goalDraft}) => {
    const history = appState?.pokedexHistory || [];
    const variantKey = pickVariant(typeKey, animalKey, history);
    const goals = goalDraft ? hydrateGoals(goalDraft.map(g => ({ ...g, done:false, streak:0 }))) : appState.goals;
    update({ hasOnboarded:true, typeKey, animalKey, variantKey, startedAt:todayStr(), needsNewCreature:false, goals });
    setScreen('home');
  };

  const pokedexEntries = React.useMemo(() => {
    if (!appState) return [];
    const history = appState.pokedexHistory.map((e,i)=>({...e, id:i+1}));
    return [...history, { id:history.length+1, typeKey:appState.typeKey, animalKey:appState.animalKey, variantKey:appState.variantKey||'a', daysReached:appState.totalDays, startedAt:appState.startedAt||todayStr(), endedAt:'—', reason:'actual', current:true }];
  }, [appState]);

  // ── Render ──
  if (authLoading) return <LoadingScreen/>;
  if (!user) return <LoginScreen/>;
  if (dataLoading || !appState) return <LoadingScreen/>;

  const data = {
    goals: appState.goals, note: appState.note, streak: appState.streak,
    totalDays: appState.totalDays,
    typeKey: appState.typeKey, animalKey: appState.animalKey, variantKey: appState.variantKey || 'a', failedDays: appState.failedDays || 0,
    type: CREATURE_TYPES[appState.typeKey], animal: CREATURE_ANIMALS[appState.animalKey],
    justEvolved: appState.justEvolved || false,
    dailyLog: appState.dailyLog || [], startedAt: appState.startedAt || todayStr(),
    cycleNumber: (appState.pokedexHistory || []).length + 1,
  };

  return (
    <div style={{ position:'relative',width:'100%',height:'100%',overflow:'hidden' }}>
      {screen==='celebration' && <CelebrationScreen creature={appState.lastCreature} onContinue={()=>{ update({lastCreature:null}); setScreen('onboard'); }}/>}
      {screen==='onboard'  && <Onboarding onDone={handleOnboardDone} pokedexHistory={appState?.pokedexHistory || []}/>}
      {screen==='home'     && <VariantSerenity data={data} onToggle={toggleGoal} onOpenPomodoro={g=>setPomo({goal:g})} onOpenNote={()=>setNoteOpen(true)} onOpenPokedex={()=>setScreen('pokedex')} onOpenSettings={()=>setSettingsOpen(true)} onClearJustEvolved={()=>update({justEvolved:false})}/>}
      {settingsOpen && <SettingsPanel goals={appState.goals} totalDays={appState.totalDays} userEmail={user?.email} onClose={()=>setSettingsOpen(false)} onSave={handleSaveGoals} onLogout={()=>{ auth.signOut(); setSettingsOpen(false); }}/>}
      {screen==='pokedex'  && <Pokedex entries={pokedexEntries} onBack={()=>setScreen('home')}/>}
      <PomodoroModal open={!!pomo} goalName={pomo?.goal?.name} durationMin={pomo?.goal?.id==='meditate'?10:25} onClose={()=>setPomo(null)}/>
      <NoteModal open={noteOpen} initial={appState.note} onClose={()=>setNoteOpen(false)} onSave={note=>update({note})}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
